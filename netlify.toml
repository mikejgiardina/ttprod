# Netlify config — single-device demo per ADR-0001.
# One serverless function holds BOTH server-side keys (Anthropic + STT vendor);
# the browser never sees them.
[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[functions]
  node_bundler = "esbuild"

[dev]
  command = "npm run dev"
  targetPort = 5173
  framework = "vite"
